name: Verify mobile app

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Contracts, typecheck, and Android export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Run behavior contracts
        run: npm run test:contracts
      - name: Typecheck
        run: npm run typecheck
      - name: Export Android bundle
        run: npm run export:android
      - name: Upload SHA-bound Android export
        uses: actions/upload-artifact@v4
        with:
          name: harvey-mobile-android-${{ github.sha }}
          path: dist/android
          if-no-files-found: error
          retention-days: 7
